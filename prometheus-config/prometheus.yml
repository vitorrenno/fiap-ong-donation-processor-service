global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'donation-processor-monitor'

scrape_configs:
  - job_name: 'donation-processor'
    static_configs:
      - targets: ['donation-processor-worker:8081']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s
