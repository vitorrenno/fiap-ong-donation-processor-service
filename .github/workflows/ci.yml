name: CI - Donation Processor

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore DonationProcessor.sln

      - name: Build
        run: dotnet build DonationProcessor.sln --no-restore --configuration Release

      - name: Testes
        run: dotnet test DonationProcessor.sln --no-build --configuration Release --verbosity normal